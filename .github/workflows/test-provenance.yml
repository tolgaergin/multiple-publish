name: Test Provenance Publish

on:
  workflow_dispatch:
    inputs:
      registry:
        description: 'Target registry (npm, github, both)'
        required: true
        default: 'npm'

permissions:
  id-token: write   # Required for Sigstore OIDC
  contents: read
  packages: write    # Required for GitHub Packages

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Rust CLI source (Phase 21 branch)
        uses: actions/checkout@v4
        with:
          repository: lpm-dev/rust-client
          ref: feature/preparing-for-final-version
          path: rust-client

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-client/target
          key: rust-${{ runner.os }}-${{ hashFiles('rust-client/Cargo.lock') }}

      - name: Build LPM Rust CLI
        working-directory: rust-client
        run: |
          cargo build --release -p lpm-cli
          sudo cp target/release/lpm-rs /usr/local/bin/lpm
          lpm --version

      - name: Publish with provenance
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REGISTRY_FLAG=""
          if [ "${{ inputs.registry }}" = "npm" ]; then
            REGISTRY_FLAG="--npm"
          elif [ "${{ inputs.registry }}" = "github" ]; then
            REGISTRY_FLAG="--github"
          elif [ "${{ inputs.registry }}" = "both" ]; then
            REGISTRY_FLAG="--npm --github"
          fi

          echo "Publishing with flags: $REGISTRY_FLAG --provenance --yes"
          lpm publish $REGISTRY_FLAG --provenance --yes
